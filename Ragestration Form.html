<!DOCTYPE html>
    <html>
        <head>
            <style>
               .head{
                   border: 10px solid gray;
                   margin: auto;
                   display: flex;
                   align-items: center;
                   justify-content: center;
                   background-color: antiquewhite;
                }
            </style>
        </head>
       
        <body>
            <div class="head">
             
                <form>
            <h1>Registration Form</h1>
            <p>Complete the form below and press the submit button!</p>
                <label for="fname">First Name</label>
                <input type="text" id='fname' name='fname'>
            <br><br>
                
                <label for='lname'>Last Name</label>
                <input type="text" id='lname' name='lname'>
            <br><br>
                
                <label for='male'>Email Addresses</label>
                <input  type='text' id='male' name='male'>
            <br><br>
                
                <label for='phone number'>Phone Number</label>
                <input type="text" id='phone number' name='phone number'>
            <br><br>
            
                
                    <p>Please select your Gender:</p>
                    <input type="radio" id='Male'
                           name='gender' value="Male">
                    <label for="male">Male</label>
                    <br>
                    <input type="radio" id='female'
                           name='gender' value="female">
                    <label for="female">Female</label>
                    <br>
            
                    <p>What is your Deggre</p>
                   
                        
                        <input type="checkbox" id="vehicle1"
                               name='vehicle1' value="High School">
                        <label for="vehicle1">I am a high school student</label>
            <br>
                          
                        <input type="checkbox" id="vehicle2"
                               name='vehicle2' value="University">
                        <label for="vehicle2">I am a university student</label>
            <br>
                    
                    <input type="checkbox" id="vehicle3"
                               name='vehicle3' value="Mastr Deggre">
                        <label for="vehicle3">I am a master deggre</label>
            <br>
            
            <p>Slect your Birth Country</p>
            
                <label for="Country">Choose a Country</label>
                <select name="country" id="country">
                    <option value="united state">United State</option>
                    <option value="australia">Australia</option>
                    <option value="canada">Canada</option>
                    <option value="afghanistan">Afghanitan</option>
                    <option value="china">China</option>
                    <option value="germany">Germany</option>
                    <option value="belgium">Belgium</option>
                    <option value="france">France</option>
                    <option value="austria">Austria</option>
                </select>
                <br>
            <br>
                
            <P>Upload Resume/CV</P>
            
               <input type="file" id='my File'
                           name='filename'> 
                <br>
                 <br>
            
            <form action="form-submit-btn">
                <input type="submit" value="Submit">
            </form>
            </form>
            </div>
        </body>
        
    
</html>
